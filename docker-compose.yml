services:
  bifrost:
    image: maximhq/bifrost
    container_name: claudemar-bifrost
    restart: unless-stopped
    # Gateway de LLM: expõe um endpoint Anthropic-compatible (/anthropic) e roteia para o
    # provedor escolhido pelo nome do modelo (provider/modelo). As chaves dos upstreams
    # (OPENAI_API_KEY, ZAI_API_KEY, SAKANA_API_KEY, BIFROST_ANTHROPIC_API_KEY) vêm do .env.
    # NOTA: o header `anthropic-beta` que o Claude Code envia é bloqueado por padrão.
    # Libere-o uma única vez na UI do Bifrost (http://localhost:8080) em
    # Settings -> Client Settings -> AllowList, adicionando `anthropic-beta`.
    env_file: .env
    volumes:
      - ./docker/bifrost/config.json:/app/data/config.json:ro
      - bifrost_data:/app/data
    ports:
      - "8080:8080"

  claudemar:
    build: .
    container_name: claudemar
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data/orchestrator:/app/orchestrator
      - ./data/agents:/app/agents
      - ./data/projects:/app/projects
      - ./data/data:/app/data
    env_file: .env
    environment:
      - DASHBOARD_PORT=3000
      - CLAUDEMAR_DATA=/app
      - MYSQL_HOST=mysql
      - GATEWAY_URL=http://bifrost:8080/anthropic
    depends_on:
      mysql:
        condition: service_healthy
      bifrost:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: claudemar-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: claudemar
      MYSQL_USER: claudemar
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-claudemar_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
  bifrost_data:
